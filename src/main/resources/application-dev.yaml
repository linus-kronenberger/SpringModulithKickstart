spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
  flyway:
    enabled: false
  datasource:
    url: ${DB_URL:jdbc:h2:mem:mydb}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:password}
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  cache:
    type:
      simple
admin:
  full-name: ${ADMIN_FULL_NAME:Admin}
  email: ${ADMIN_MAIL:admin@admin.com}
  password: ${ADMIN_PASSWORD:admin}
security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
    expiration-time: ${JWT_EXPIRATION_TIME:3600000}
