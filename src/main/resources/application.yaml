spring:
  output:
    ansi:
      enabled: always
  application:
    name: SpringModulithKickstart
  profiles:
    active: ${ACTIVE_PROFILE:dev}
springdoc:
  swagger-ui:
    path: /admin/swagger
  api-docs:
    path: /admin/api-docs
management:
  endpoints:
    web:
      base-path: /admin/actuator
      exposure:
        include: health, info, modulith