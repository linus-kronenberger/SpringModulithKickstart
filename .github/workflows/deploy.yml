# ============================================================
# Required GitHub Secrets:
#   VPS_HOST      – Public IP of the VPS
#   VPS_PORT      – SSH port (usually 22)
#   VPS_USER      – SSH user (e.g. ubuntu)
#   VPS_SSH_KEY   – Private SSH key for VPS_USER
#   DB_PASSWORD   – PostgreSQL password
# ============================================================

name: Build and Deploy

on:
  push:
    branches: [main, production]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
      - name: Code style check
        run: ./mvnw spotless:check --no-transfer-progress

  test:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
      - name: Run unit and integration tests
        run: ./mvnw test --no-transfer-progress

  build:
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
      - name: Build JAR
        run: ./mvnw clean package -DskipTests --no-transfer-progress
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/SpringModulithKickstart-0.0.1-SNAPSHOT.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: jar-file

      - name: Package deployment files
        run: |
          mkdir -p target
          cp SpringModulithKickstart-0.0.1-SNAPSHOT.jar target/
          tar czf deploy.tar.gz \
            target/SpringModulithKickstart-0.0.1-SNAPSHOT.jar \
            Dockerfile docker-compose.yml

      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: deploy.tar.gz
          target: /home/ubuntu/

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            tar xzf /home/ubuntu/deploy.tar.gz
            rm /home/ubuntu/deploy.tar.gz
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            docker compose up --build -d
