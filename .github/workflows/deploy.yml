# ============================================================
# Required GitHub Secrets:
#   VPS_HOST          – Public IP of the VPS
#   VPS_PORT          – SSH port (usually 22)
#   VPS_USER          – SSH user (e.g. deploy)
#   VPS_SSH_KEY       – Private SSH key for VPS_USER
#   DB_NAME           – PostgreSQL database name
#   DB_USER           – PostgreSQL user
#   DB_PASSWORD       – PostgreSQL password
#   ACTIVE_PROFILE    – Spring active profile (e.g. prod)
#   ADMIN_FULL_NAME   – Admin full name
#   ADMIN_MAIL        – Admin email address
#   ADMIN_PASSWORD    – Admin password
#   JWT_SECRET_KEY    – JWT signing secret
#   JWT_EXPIRATION_TIME – JWT token expiry in ms
#   REDIS_HOST        – Redis host
#   REDIS_PORT        – Redis port
# ============================================================

name: Build and Deploy

on:
  push:
    branches: [main, production]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
      - name: Code style check
        run: ./mvnw spotless:check --no-transfer-progress

  test:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
      - name: Run unit and integration tests
        run: ./mvnw test --no-transfer-progress

  build:
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven
      - name: Build JAR
        run: ./mvnw clean package -DskipTests --no-transfer-progress
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/SpringModulithKickstart-0.0.1-SNAPSHOT.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: jar-file

      - name: Package deployment files
        run: |
          mkdir -p target
          cp SpringModulithKickstart-0.0.1-SNAPSHOT.jar target/
          tar czf deploy.tar.gz \
            target/SpringModulithKickstart-0.0.1-SNAPSHOT.jar \
            Dockerfile docker-compose.yml

      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: deploy.tar.gz
          target: /home/deploy/

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p /home/deploy/app
            cd /home/deploy/app
            tar xzf /home/deploy/deploy.tar.gz
            rm /home/deploy/deploy.tar.gz
            export DB_NAME="${{ secrets.DB_NAME }}"
            export DB_USER="${{ secrets.DB_USER }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export ACTIVE_PROFILE="${{ secrets.ACTIVE_PROFILE }}"
            export ADMIN_FULL_NAME="${{ secrets.ADMIN_FULL_NAME }}"
            export ADMIN_MAIL="${{ secrets.ADMIN_MAIL }}"
            export ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}"
            export JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}"
            export JWT_EXPIRATION_TIME="${{ secrets.JWT_EXPIRATION_TIME }}"
            export REDIS_HOST="${{ secrets.REDIS_HOST }}"
            export REDIS_PORT="${{ secrets.REDIS_PORT }}"
            docker compose up --build -d
